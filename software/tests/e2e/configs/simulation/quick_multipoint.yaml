# Quick Multipoint Acquisition (V2 Format)
# Single round, multi-channel, minimal z-stack
# For testing coordinate/region handling
# Recommended: 2-4 FOVs across 1-2 regions

name: "Quick Multipoint"
version: "2.0"
description: "Fast multipoint acquisition for testing region handling"

error_handling:
  focus_failure: skip
  fluidics_failure: abort
  imaging_failure: warn

imaging_protocols:
  multipoint_scan:
    description: "Multipoint scan configuration"
    channels:
      - "BF LED matrix full"
    z_stack:
      planes: 2
      step_um: 2.0
    focus:
      enabled: false
    skip_saving: true

fov_sets:
  main: ../fov_positions/test_4fov_grid.csv

rounds:
  - name: "Multipoint Scan"
    steps:
      - step_type: imaging
        protocol: multipoint_scan
        fovs: main
