# Demo Full Workflow
# Complete fluidics + imaging workflow (realistic but fast)
# 3 rounds: Setup -> Imaging -> Cleanup
# Recommended: 1-2 FOVs

name: Demo Full Workflow
version: "1.0"
description: Complete demonstration workflow with fluidics and imaging
fov_positions_file: ../fov_positions/test_2fov_simple.csv
fluidics_protocols_file: ../fluidics/test_fluidics_protocols.yaml

defaults:
  imaging:
    channels:
      - "BF LED matrix full"
    z_planes: 1
    use_autofocus: false

rounds:
  # Setup: Prime and prepare sample
  - name: Sample Preparation
    type: wash
    fluidics_protocol: sample_preparation

  # Main imaging (no fluidics)
  - name: Main Acquisition
    type: imaging
    imaging:
      channels:
        - "BF LED matrix full"
        - "Fluorescence 488 nm Ex"
      z_planes: 3
      z_step_um: 1.0

  # Cleanup
  - name: Sample Cleanup
    type: wash
    fluidics_protocol: sample_cleanup
