# Demo Full Workflow (V2 Format)
# Complete fluidics + imaging workflow (realistic but fast)
# 3 rounds: Setup -> Imaging -> Cleanup
# Recommended: 1-2 FOVs

name: "Demo Full Workflow"
version: "2.0"
description: "Complete demonstration workflow with fluidics and imaging"

error_handling:
  focus_failure: skip
  fluidics_failure: abort
  imaging_failure: warn

imaging_protocols:
  main_acquisition:
    description: "Main acquisition configuration"
    channels:
      - "BF LED matrix full"
      - "Fluorescence 488 nm Ex"
    z_stack:
      planes: 3
      step_um: 1.0
    focus:
      enabled: false
    skip_saving: true

fov_sets:
  main: ../fov_positions/test_2fov_simple.csv

rounds:
  # Setup: Prime and prepare sample
  - name: "Sample Preparation"
    steps:
      - step_type: fluidics
        protocol: sample_preparation

  # Main imaging (no fluidics)
  - name: "Main Acquisition"
    steps:
      - step_type: imaging
        protocol: main_acquisition
        fovs: main

  # Cleanup
  - name: "Sample Cleanup"
    steps:
      - step_type: fluidics
        protocol: sample_cleanup
