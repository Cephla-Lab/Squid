# Quick Fluidics Wash Sequence
# 3 wash cycles, no imaging

name: Quick Wash Sequence
version: "1.0"
description: Fast fluidics wash sequence for manual testing
fluidics_protocols_file: ../fluidics/test_fluidics_protocols.yaml

rounds:
  - name: Initial Rinse
    type: wash
    fluidics_protocol: initial_rinse

  - name: Main Wash
    type: wash
    fluidics_protocol: main_wash

  - name: Final Rinse
    type: wash
    fluidics_protocol: final_rinse
