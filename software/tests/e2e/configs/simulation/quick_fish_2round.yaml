# Quick 2-Round FISH Simulation
# Realistic structure, fast execution
# 2 FOVs recommended

name: Quick 2-Round FISH
version: "1.0"
description: Fast 2-round FISH simulation for manual testing
fov_positions_file: ../fov_positions/test_2fov_simple.csv
fluidics_protocols_file: ../fluidics/test_fluidics_protocols.yaml

defaults:
  imaging:
    channels:
      - "BF LED matrix full"
      - "Fluorescence 488 nm Ex"
    z_planes: 3
    z_step_um: 1.0
    use_autofocus: false

rounds:
  # Round 1: Hybridization 1
  - name: Hybridization 1
    type: imaging
    fluidics_protocol: hybridization_1
    imaging:
      channels: ["Fluorescence 488 nm Ex"]
      z_planes: 3
      z_step_um: 1.0

  # Round 2: Hybridization 2
  - name: Hybridization 2
    type: imaging
    fluidics_protocol: hybridization_2
    imaging:
      channels: ["Fluorescence 488 nm Ex"]
      z_planes: 3
      z_step_um: 1.0
