# V2 Minimal Protocol
# Simple protocol with one round, one imaging step for basic testing.

name: "V2 Minimal Test"
version: "2.0"
description: "Minimal V2 protocol for basic testing"

imaging_protocols:
  standard:
    description: "Single channel imaging"
    channels:
      - "Fluorescence 405 nm Ex"
    z_stack:
      planes: 1
    focus:
      enabled: false

fov_sets:
  main: ../fov_positions/test_2fov_simple.csv

rounds:
  - name: "Round 1"
    steps:
      - step_type: imaging
        protocol: standard
        fovs: main
