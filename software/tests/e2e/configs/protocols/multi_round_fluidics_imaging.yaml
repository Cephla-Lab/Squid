name: "Multi-Round Fluidics Imaging"
version: "3.0"
description: "Three interleaved probe-delivery rounds with updated imaging recipes."
output_directory: ../outputs

resources:
  imaging_protocol_file: resource_files/imaging_protocols.yaml
  fluidics_protocols_file: ../fluidics/test_fluidics_protocols.yaml
  fluidics_config_file: ../fluidics/simulation_fluidics.json
  fov_file: ../fov_positions/test_4fov_grid.csv

rounds:
  - name: "Round 1 Probe 1"
    steps:
      - step_type: fluidics
        protocol: wash
      - step_type: fluidics
        protocol: probe_1
      - step_type: imaging
        protocol: fluorescence_405
        fovs: default
        output_label: probe_1_reference
  - name: "Round 2 Probe 2"
    steps:
      - step_type: fluidics
        protocol: strip_fluorophores
      - step_type: fluidics
        protocol: probe_2
      - step_type: imaging
        protocol: fluorescence_488_561
        fovs: default
        output_label: probe_2_dual_color
  - name: "Round 3 Probe 3"
    steps:
      - step_type: fluidics
        protocol: strip_fluorophores
      - step_type: fluidics
        protocol: probe_3
      - step_type: imaging
        protocol: fish_multichannel
        fovs: default
        output_label: probe_3_multichannel
  - name: "Final Wash"
    steps:
      - step_type: fluidics
        protocol: final_wash
