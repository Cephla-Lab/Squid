name: "Single Round Imaging (Save)"
version: "3.0"
description: "Single-plane brightfield acquisition that writes image output."
output_directory: ../outputs

resources:
  imaging_protocol_file: resource_files/imaging_protocols.yaml
  fluidics_config_file: ../fluidics/simulation_fluidics.json
  fov_file: ../fov_positions/test_4fov_grid.csv

rounds:
  - name: "Saved Brightfield"
    steps:
      - step_type: imaging
        protocol: bf_saved
        fovs: default
