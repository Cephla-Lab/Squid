# Single Round Imaging with Save (V2 Format)
# Single-round imaging with saving enabled for e2e output validation

name: "Single Round Imaging (Save)"
version: "2.0"
description: "Single-round imaging with saving enabled for e2e output validation"

error_handling:
  focus_failure: skip
  fluidics_failure: abort
  imaging_failure: warn

imaging_configs:
  bf_single_save:
    description: "Single plane brightfield with saving"
    channels:
      - "BF LED matrix full"
    z_stack:
      planes: 1
      step_um: 0.5
    focus:
      enabled: false
    skip_saving: false

fov_sets:
  main: ../fov_positions/test_4fov_grid.csv

rounds:
  - name: "Imaging"
    steps:
      - step_type: imaging
        config: bf_single_save
        fovs: main
