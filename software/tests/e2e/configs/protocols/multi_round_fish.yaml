name: 4-Round FISH Protocol
version: "1.0"
description: Multi-round FISH experiment with fluidics and imaging for e2e validation
fov_positions_file: ../fov_positions/test_4fov_grid.csv
fluidics_protocols_file: ../fluidics/test_fluidics_protocols.yaml

defaults:
  imaging:
    channels:
      - "Fluorescence 405 nm Ex"
      - "Fluorescence 488 nm Ex"
    z_planes: 3
    z_step_um: 0.5
    use_autofocus: false
    skip_saving: true

rounds:
  # Round 1: Hybridization with probe set 1
  - name: Round 1 - Hybridization
    type: imaging
    fluidics_protocol: probe_1_hybridization
    imaging:
      channels:
        - "Fluorescence 405 nm Ex"
      z_planes: 3
      z_step_um: 0.5
      skip_saving: true

  # Round 1: Strip fluorophores
  - name: Round 1 - Strip
    type: wash
    fluidics_protocol: strip_fluorophores

  # Round 2: Hybridization with probe set 2
  - name: Round 2 - Hybridization
    type: imaging
    fluidics_protocol: probe_2_hybridization
    imaging:
      channels:
        - "Fluorescence 488 nm Ex"
      z_planes: 3
      z_step_um: 0.5
      skip_saving: true

  # Final wash and storage
  - name: Final Wash
    type: wash
    fluidics_protocol: final_wash
