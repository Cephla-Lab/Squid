# V2 Fluidics + Imaging Protocol
# Protocol with fluidics -> imaging sequence to test basic step ordering.

name: "V2 Fluidics-Imaging Test"
version: "2.0"
description: "Tests fluidics followed by imaging step sequence"

imaging_protocols:
  standard:
    description: "Standard imaging after wash"
    channels:
      - "Fluorescence 405 nm Ex"
      - "Fluorescence 488 nm Ex"
    z_stack:
      planes: 3
      step_um: 1.0
    focus:
      enabled: true
      method: laser

fov_sets:
  main: ../fov_positions/test_2fov_simple.csv

rounds:
  - name: "Round 1"
    steps:
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        protocol: standard
        fovs: main
