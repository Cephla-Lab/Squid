name: "Repeated Probe Rounds"
version: "3.0"
description: "Three repeated fluidics/imaging rounds with automatic resource loading."
output_directory: ../outputs

resources:
  imaging_protocol_file: resource_files/imaging_protocols.yaml
  fluidics_protocols_file: ../fluidics/test_fluidics_protocols.yaml
  fluidics_config_file: ../fluidics/simulation_fluidics.json
  fov_file: ../fov_positions/test_2fov_simple.csv

rounds:
  - name: "Probe Round {i}"
    repeat: 3
    steps:
      - step_type: fluidics
        protocol: probe_{i}
      - step_type: imaging
        protocol: fluorescence_405
        fovs: default
      - step_type: fluidics
        protocol: wash
