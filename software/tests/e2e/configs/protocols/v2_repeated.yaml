# V2 Repeated Rounds Protocol
# Protocol using repeat: 5 with {i} substitution to test round expansion.

name: "V2 Repeated Rounds Test"
version: "2.0"
description: "Tests round expansion with {i} substitution"

imaging_protocols:
  fish_standard:
    description: "FISH imaging"
    channels:
      - DAPI
      - Cy5
    z_stack:
      planes: 5
      step_um: 0.5
    focus:
      enabled: true
      method: laser
      interval_fovs: 1

rounds:
  - name: "Round {i}"
    repeat: 5
    steps:
      - step_type: fluidics
        protocol: probe_{i}
      - step_type: imaging
        protocol: fish_standard
      - step_type: fluidics
        protocol: wash
