# Intervention Protocol (V2 Format)
# Protocol requiring operator intervention between rounds

name: "Intervention Protocol"
version: "2.0"
description: "Protocol requiring operator intervention between rounds"

error_handling:
  focus_failure: skip
  fluidics_failure: abort
  imaging_failure: warn

imaging_protocols:
  bf_quick:
    description: "Quick brightfield imaging"
    channels:
      - "BF LED matrix full"
    z_stack:
      planes: 1
    focus:
      enabled: false
    skip_saving: true

  multichannel_quick:
    description: "Quick multi-channel imaging"
    channels:
      - "BF LED matrix full"
      - "Fluorescence 488 nm Ex"
    z_stack:
      planes: 1
    focus:
      enabled: false
    skip_saving: true

fov_sets:
  main: ../fov_positions/test_2fov_simple.csv

rounds:
  # Initial imaging
  - name: "Pre-Intervention Imaging"
    steps:
      - step_type: imaging
        protocol: bf_quick
        fovs: main

  # Operator intervention required
  - name: "Sample Change"
    steps:
      - step_type: intervention
        message: "Please replace sample and adjust focus. Press acknowledge when ready to continue."

  # Post-intervention imaging
  - name: "Post-Intervention Imaging"
    steps:
      - step_type: imaging
        protocol: bf_quick
        fovs: main

  # Another intervention for demonstration
  - name: "Final Check"
    steps:
      - step_type: intervention
        message: "Verify sample integrity before final acquisition."

  # Final acquisition
  - name: "Final Imaging"
    steps:
      - step_type: imaging
        protocol: multichannel_quick
        fovs: main
