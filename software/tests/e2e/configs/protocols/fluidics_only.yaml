# Fluidics Only Protocol (V2 Format)
# Fluidics-only workflow for testing pump and valve control

name: "Fluidics Only Protocol"
version: "2.0"
description: "Fluidics-only workflow for testing pump and valve control"

error_handling:
  focus_failure: skip
  fluidics_failure: abort
  imaging_failure: warn

fluidics_protocols:
  system_prime:
    description: "Prime the fluidics system"
    steps:
      - operation: flow
        solution: wash_buffer
        volume_ul: 500
        flow_rate_ul_per_min: 200

  stain_application:
    description: "Apply primary stain"
    steps:
      - operation: flow
        solution: stain_1
        volume_ul: 100
        flow_rate_ul_per_min: 25
      - operation: incubate
        duration_s: 2

  secondary_stain:
    description: "Apply secondary stain"
    steps:
      - operation: flow
        solution: stain_2
        volume_ul: 100
        flow_rate_ul_per_min: 25
      - operation: incubate
        duration_s: 2

  final_rinse:
    description: "Final rinse"
    steps:
      - operation: flow
        solution: wash_buffer
        volume_ul: 200
        flow_rate_ul_per_min: 100
        repeats: 2

rounds:
  # Prime the system
  - name: "System Prime"
    steps:
      - step_type: fluidics
        protocol: system_prime

  # Staining sequence
  - name: "Stain Application"
    steps:
      - step_type: fluidics
        protocol: stain_application

  # Second stain
  - name: "Secondary Stain"
    steps:
      - step_type: fluidics
        protocol: secondary_stain

  # Final rinse
  - name: "Final Rinse"
    steps:
      - step_type: fluidics
        protocol: final_rinse
