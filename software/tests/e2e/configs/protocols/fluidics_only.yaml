# Fluidics Only Protocol (V2 Format)
# Fluidics-only workflow for testing pump and valve control

name: "Fluidics Only Protocol"
version: "2.0"
description: "Fluidics-only workflow for testing pump and valve control"

error_handling:
  focus_failure: skip
  fluidics_failure: abort
  imaging_failure: warn

rounds:
  # Prime the system
  - name: "System Prime"
    steps:
      - step_type: fluidics
        protocol: system_prime

  # Staining sequence
  - name: "Stain Application"
    steps:
      - step_type: fluidics
        protocol: stain_application

  # Second stain
  - name: "Secondary Stain"
    steps:
      - step_type: fluidics
        protocol: secondary_stain

  # Final rinse
  - name: "Final Rinse"
    steps:
      - step_type: fluidics
        protocol: final_rinse
