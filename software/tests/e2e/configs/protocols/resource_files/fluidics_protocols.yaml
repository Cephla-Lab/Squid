# Small external fluidics library used by the self-loading resource-path examples.

protocols:
  resource_test_wash:
    description: "Simple wash for resource file path testing"
    steps:
      - operation: wash
        solution: wash_buffer
        volume_ul: 100
        flow_rate_ul_per_min: 100

  resource_test_probe:
    description: "Probe delivery followed by a short incubation"
    steps:
      - operation: flow
        solution: probe_1
        volume_ul: 50
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 1

  resource_test_rinse:
    description: "Short rinse before the final imaging pass"
    steps:
      - operation: wash
        solution: rinse_buffer
        volume_ul: 100
        flow_rate_ul_per_min: 100
