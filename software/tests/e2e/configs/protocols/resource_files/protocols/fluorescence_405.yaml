description: "Reference 405 nm fluorescence imaging using continuous focus lock."
acquisition:
  channels:
    - name: "Fluorescence 405 nm Ex"
      exposure_time_ms: 200.0
  z_stack:
    planes: 15
    step_um: 1.5
    direction: from_center
  acquisition_order: channel_first
  skip_saving: true
focus_gate:
  mode: focus_lock
  interval_fovs: 1
  require_in_focus: true
  max_focus_attempts: 2
  on_focus_gate_fail: skip_fov
capture_policy:
  max_capture_attempts: 2
  retry_delay_s: 0.1
  on_capture_fail: fail_step
