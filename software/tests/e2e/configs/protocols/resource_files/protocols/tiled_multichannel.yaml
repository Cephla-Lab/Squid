description: "Grid-friendly brightfield plus fluorescence z-stack."
acquisition:
  channels:
    - "BF LED matrix full"
    - "Fluorescence 488 nm Ex"
  z_stack:
    planes: 5
    step_um: 1.0
    direction: from_center
  acquisition_order: z_first
  skip_saving: true
focus_gate:
  mode: none
  interval_fovs: 1
  require_in_focus: false
  max_focus_attempts: 1
  on_focus_gate_fail: skip_fov
capture_policy:
  max_capture_attempts: 1
  retry_delay_s: 0.0
  on_capture_fail: fail_step
