# 10-Round FISH Protocol (V2 Format)
# Example protocol for fluorescence in situ hybridization experiments

name: "10-Round FISH"
version: "2.0"
description: |
  Standard 10-round FISH protocol with DAPI and Cy5 imaging.
  Includes wash steps between imaging rounds.
author: "Squid Team"

error_handling:
  focus_failure: skip
  fluidics_failure: abort
  imaging_failure: warn

fluidics_protocols:
  probe_1:
    description: "Probe mix 1 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_1
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_2:
    description: "Probe mix 2 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_2
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_3:
    description: "Probe mix 3 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_3
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_4:
    description: "Probe mix 4 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_4
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_5:
    description: "Probe mix 5 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_5
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_6:
    description: "Probe mix 6 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_6
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_7:
    description: "Probe mix 7 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_7
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_8:
    description: "Probe mix 8 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_8
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_9:
    description: "Probe mix 9 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_9
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  probe_10:
    description: "Probe mix 10 hybridization"
    steps:
      - operation: flow
        solution: probe_mix_10
        volume_ul: 100
        flow_rate_ul_per_min: 50
      - operation: incubate
        duration_s: 300

  wash:
    description: "Standard SSC wash"
    steps:
      - operation: flow
        solution: SSC_2x
        volume_ul: 500
        flow_rate_ul_per_min: 100
        repeats: 3

  final_wash:
    description: "Final PBS wash"
    steps:
      - operation: flow
        solution: PBS
        volume_ul: 1000
        flow_rate_ul_per_min: 100
        repeats: 5

imaging_configs:
  fish_standard:
    description: "Standard FISH imaging"
    channels:
      - DAPI
      - Cy5
    z_stack:
      planes: 5
      step_um: 0.5
      direction: from_center
    focus:
      enabled: true
      method: laser
      interval_fovs: 1

rounds:
  # Round 1
  - name: "Round 1"
    steps:
      - step_type: fluidics
        protocol: probe_1
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 2
  - name: "Round 2"
    steps:
      - step_type: fluidics
        protocol: probe_2
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 3
  - name: "Round 3"
    steps:
      - step_type: fluidics
        protocol: probe_3
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 4
  - name: "Round 4"
    steps:
      - step_type: fluidics
        protocol: probe_4
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 5
  - name: "Round 5"
    steps:
      - step_type: fluidics
        protocol: probe_5
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 6 - with operator intervention
  - name: "Round 6"
    steps:
      - step_type: intervention
        message: "Please check sample condition before continuing"
      - step_type: fluidics
        protocol: probe_6
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 7
  - name: "Round 7"
    steps:
      - step_type: fluidics
        protocol: probe_7
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 8
  - name: "Round 8"
    steps:
      - step_type: fluidics
        protocol: probe_8
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 9
  - name: "Round 9"
    steps:
      - step_type: fluidics
        protocol: probe_9
      - step_type: fluidics
        protocol: wash
      - step_type: imaging
        config: fish_standard

  # Round 10 - final round
  - name: "Round 10"
    steps:
      - step_type: fluidics
        protocol: probe_10
      - step_type: fluidics
        protocol: final_wash
      - step_type: imaging
        config: fish_standard
